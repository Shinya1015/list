<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しゃいるの歌枠リスト</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* 設置雪花顏色 */
        .snowflake {
            color: #ADD8E6; /* 設置雪花顏色為淡藍色 */
        }

        /* 讓🎧圖案在畫面最右下角顯示 */
        #music-link {
            position: fixed;
            bottom: 20px;
            right: 10px; /* 確保在畫面最右邊 */
            font-size: 40px;
            color: #fff;
            text-decoration: none; /* 去掉下劃線 */
            transition: transform 0.3s ease, color 0.3s ease;
            z-index: 9999;
        }

        /* 當鼠標懸停在🎧上時的效果 */
        #music-link:hover {
            color: #00BCD4;
            transform: scale(1.2);
        }

        /* 设定YouTube图标的样式 */
        #youtube-link {
            position: fixed; /* 固定位置 */
            bottom: 20px;     /* 距离底部 20px */
            right: 80px;      /* 向左調整位置，避免重疊 */
            z-index: 1000;    /* 确保图标在最上层 */
        }

        #youtube-link img {
            width: 50px;      /* 图标宽度 */
            height: 50px;     /* 图标高度 */
            object-fit: contain; /* 保持图标比例不变 */
        }

        #music-link img {
            width: 50px;      /* 图标宽度 */
            height: 50px;     /* 图标高度 */
            object-fit: contain; /* 保持图标比例不变 */
        }
    </style>
</head>
<body>
    <div class="container" id="main-content">
        <h1>🌟ランダムで抽選<span class="snowflake">❄</span></h1>
        <button id="select-button" onclick="selectRandomSong()">抽選</button>
        <!-- <h2>抽選結果:</h2> -->
        <p id="song-result">抽選ボタンを押してね！</p>
        <button onclick="toggleSongList()">全リストを見る</button>
        <a href="https://cooked-snowboard-2b7.notion.site/16bc0662e4368082a3bfc982aa928702?v=16bc0662e436812981a1000c061b7652&pvs=74" target="_blank" id="music-link">
            🎧
        </a>
    </div>

    <div id="song-list" style="display: none;">
        <div class="song-list-header">
            <h2>歌枠リスト</h2>
            <p id="song-count">総曲数: 0</p>
            <button onclick="closeSongList()">閉じる</button>
        </div>
        <div class="scrollable-list">
            <ul id="songs"></ul>
        </div>
    </div>

    <!-- YouTube 图标链接 -->
    <a href="https://www.youtube.com/@Shairu.ch_0801" target="_blank" id="youtube-link">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/42/YouTube_icon_%282013-2017%29.png" alt="YouTube">
    </a>

    <!-- 流星元素 -->
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>

    <script src="script.js"></script>
</body>
</html>
