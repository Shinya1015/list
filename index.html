<head>

    <link rel="stylesheet" href="style.css">

    <style>
        /* 設置雪花顏色 */
        .snowflake {
            color: #ADD8E6; /* 設置雪花顏色為淡藍色 */
        }

        /* 讓🎧圖案在畫面最右下角顯示 */
        #music-link {
            position: fixed;
            bottom: 20px;
            right: 10px; /* 確保在畫面最右邊 */
            font-size: 40px;
            color: #fff;
            text-decoration: none; /* 去掉下劃線 */
            transition: transform 0.3s ease, color 0.3s ease;
            z-index: 9999;
             display: block !important; /* 強制顯示音樂圖標 */
        }

        /* 當鼠標懸停在🎧上時的效果 */
        #music-link:hover {
            color: #00BCD4;
            transform: scale(1.2);
        }

        /* 设定YouTube图标的样式 */
        #youtube-link {
            position: fixed; /* 固定位置 */
            bottom: 5px;     /* 距离底部 5px，向下移动 */
            right: 80px;      /* 向左調整位置，避免重疊 */
            z-index: 1000;    /* 确保图标在最上层 */
        }

        #youtube-link img {
            width: 50px;      /* 图标宽度 */
            height: 50px;     /* 图标高度 */
            object-fit: contain; /* 保持图标比例不变 */
        }

        #music-link img {
            width: 50px;      /* 图标宽度 */
            height: 50px;     /* 图标高度 */
            object-fit: contain; /* 保持图标比例不变 */
        }

        /* 确保🎧图标不在歌单显示时消失 */
        #music-link {
            display: block; /* 始终保持显示 */
        }
    </style>
</head>
